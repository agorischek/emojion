trigger: none

pr:
  - master

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    displayName: Check out source

  - task: UseNode@1
    inputs:
      version: 24.x
    displayName: Install Node

  - task: Npm@1
    inputs:
      command: ci
    displayName: Install dependencies

  - task: Npm@1
    inputs:
      command: custom
      customCommand: run build
    displayName: Build

  - task: Npm@1
    inputs:
      command: custom
      customCommand: test
    displayName: Run tests
